# scalability_randomtopo experiment parameters

# random seed for the first run
seed_base = 100
# number of runs
runs = 2
# simulation duration, seconds on simulated clock
sim_duration = 1.0
# how many pairs of qubits per quantum channel
qchannel_capacity = 2
# wall-clock time limit, seconds on wall clock
time_limit = 45.0
# whether to compare with SeQUeNCe simulation
enable_sequence = true

# how many nodes and edges in the randomly generated networks
network_sizes = [
    { nodes =  16, edges =  20 },
    { nodes =  32, edges =  40 },
    { nodes =  64, edges =  80 },
    { nodes = 128, edges = 160 },
]

# CPU cores for parallel execution
cpuset_cpus = [2, 3]
